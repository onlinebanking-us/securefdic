<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Bank Admin</h1>
      <p class="text-gray-500 mt-2">Sign in to access the admin dashboard</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="admin@example.com"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        >
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        >
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center space-x-2">
          <input type="checkbox" class="rounded">
          <span class="text-gray-600">Remember me</span>
        </label>

        <a href="#" class="text-blue-600 hover:underline">Forgot Password?</a>
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200"
      >
        Login
      </button>
    </form>

    <div id="message" class="mt-5 text-center text-sm"></div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const message = document.getElementById('message');

      if (!email || !password) {
        message.innerHTML = '<span class="text-red-500">Please fill in all fields.</span>';
        return;
      }

      const BASE_URL = 'http://secure.learnersxp.com/api';

      fetch(`${BASE_URL}/v1/admin/login`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({
          email: email,
          password: password
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.token) {
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_data', JSON.stringify(data.admin || {}));

          message.innerHTML = '<span class="text-green-600">Login successful. Redirecting...</span>';

          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
        } else {
          message.innerHTML = `<span class="text-red-500">${data.error || data.message || 'Login failed'}</span>`;
        }
      })
      .catch(error => {
        message.innerHTML = '<span class="text-red-500">Server error. Please try again.</span>';
        console.error(error);
      });
    });
  </script>

</body>
</html>
