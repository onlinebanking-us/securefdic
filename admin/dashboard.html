<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-gray-900 text-white flex flex-col">
    <div class="p-4 text-2xl font-bold border-b border-gray-700">Bank Admin</div>
    <nav class="flex-1 p-4 space-y-2">
      <button onclick="showPage('dashboard')" class="w-full text-left p-2 hover:bg-gray-700 rounded">Dashboard</button>
      <button onclick="showPage('users')" class="w-full text-left p-2 hover:bg-gray-700 rounded">Users</button>
      <button onclick="showPage('transactions')" class="w-full text-left p-2 hover:bg-gray-700 rounded">Transactions</button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col">

    <!-- Topbar -->
    <div class="bg-white shadow p-4 flex justify-between items-center">
      <h1 class="text-xl font-bold">Admin Dashboard</h1>

      <div class="relative">
        <button onclick="toggleProfileMenu()" class="flex items-center space-x-2">
          <div class="w-8 h-8 bg-gray-300 rounded-full"></div>
          <span id="adminName">Admin</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </button>

        <div id="profileMenu" class="hidden absolute right-0 mt-2 w-40 bg-white shadow rounded">
          <button onclick="showPage('profile')" class="block w-full text-left px-4 py-2 hover:bg-gray-100">Profile</button>
          <button onclick="logout()" class="block w-full text-left px-4 py-2 hover:bg-gray-100 text-red-500">Logout</button>
        </div>
      </div>
    </div>

    <div class="flex-1 p-6 overflow-y-auto">

      <!-- Dashboard -->
      <section id="dashboard" class="page">
        <h1 class="text-2xl font-bold mb-4">Dashboard</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white p-4 rounded shadow">
            Total Users<br>
            <span class="text-xl font-bold">0</span>
          </div>
          <div class="bg-white p-4 rounded shadow">
            Transactions<br>
            <span class="text-xl font-bold">0</span>
          </div>
          <div class="bg-white p-4 rounded shadow">
            Pending<br>
            <span class="text-xl font-bold">0</span>
          </div>
        </div>
      </section>

      <!-- Profile -->
      <section id="profile" class="page hidden">
        <h1 class="text-2xl font-bold mb-4">Edit Profile</h1>

        <div class="bg-white p-6 rounded shadow max-w-lg">

          <!-- Name -->
          <div class="mb-4">
            <label class="block mb-1">Name</label>
            <input
              id="admin_profile_name"
              type="text"
              class="w-full border p-2 rounded"
              placeholder="Enter full name"
            >
          </div>

          <!-- Email -->
          <div class="mb-4">
            <label class="block mb-1">Email</label>
            <input
              id="admin_profile_email"
              type="email"
              class="w-full border p-2 rounded"
              placeholder="Enter email"
            >
          </div>

          <!-- Username -->
          <div class="mb-4">
            <label class="block mb-1">Username</label>
            <input
              id="admin_profile_username"
              type="text"
              class="w-full border p-2 rounded"
              placeholder="Enter username"
            >
          </div>

          <!-- New Password -->
          <div class="mb-4">
            <label class="block mb-1">New Password</label>
            <input
              id="admin_profile_password"
              type="password"
              class="w-full border p-2 rounded"
              placeholder="Leave empty to keep current password"
            >
          </div>

          <!-- Confirm Password -->
          <div class="mb-4">
            <label class="block mb-1">Confirm Password</label>
            <input
              id="admin_profile_password_confirmation"
              type="password"
              class="w-full border p-2 rounded"
              placeholder="Confirm new password"
            >
          </div>

          <button
            onclick="updateAdminProfile()"
            class="bg-blue-600 text-white px-4 py-2 rounded"
          >
            Save Changes
          </button>

        </div>
      </section>

      <!-- USERS -->
      <section id="users" class="page hidden">
        <div class="flex justify-between items-center mb-4">
          <h1 class="text-2xl font-bold">Users</h1>
          <button onclick="showPage('addUser')" class="bg-green-600 text-white px-4 py-2 rounded">+ Add</button>
        </div>

        <table class="w-full bg-white rounded shadow">
          <thead class="bg-gray-200">
            <tr>
              <th class="p-2">Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <!-- ADD USER -->
      <section id="addUser" class="page hidden">
        <h1 class="text-2xl font-bold mb-4">Add New User</h1>
        <div class="bg-white p-6 rounded shadow max-w-2xl">
          <input id="firstname" class="w-full border p-2 mb-3 rounded" placeholder="First Name">
          <input id="lastname" class="w-full border p-2 mb-3 rounded" placeholder="Last Name">
          <input id="email" class="w-full border p-2 mb-3 rounded" placeholder="Email">
          <input id="phone" class="w-full border p-2 mb-3 rounded" placeholder="Phone">
          <input id="username" class="w-full border p-2 mb-3 rounded" placeholder="Username">
          <input id="password" class="w-full border p-2 mb-3 rounded" type="password" placeholder="Password">
          <input id="password_confirmation" class="w-full border p-2 mb-3 rounded" type="password" placeholder="Confirm Password">
          <button onclick="createUser()" class="bg-blue-600 text-white px-4 py-2 rounded">
            Create User
          </button>
        </div>
      </section>

      <!-- TRANSACTIONS -->
      <section id="transactions" class="page hidden">
        <div class="flex justify-between items-center mb-4">
          <h1 class="text-2xl font-bold">Transactions</h1>
          <button onclick="showPage('addTransaction')" class="bg-green-600 text-white px-4 py-2 rounded">+ Add</button>
        </div>

        <div class="mb-4 flex space-x-2">
          <button onclick="filterTransactions('all')" class="filter-btn bg-blue-600 text-white px-3 py-1 rounded">All</button>
          <button onclick="filterTransactions('incoming')" class="filter-btn bg-gray-200 px-3 py-1 rounded">Incoming</button>
          <button onclick="filterTransactions('outgoing')" class="filter-btn bg-gray-200 px-3 py-1 rounded">Outgoing</button>
          <button onclick="filterTransactions('pending')" class="filter-btn bg-gray-200 px-3 py-1 rounded">Pending</button>
        </div>

        <table class="w-full bg-white rounded shadow">
          <thead class="bg-gray-200">
            <tr>
              <th class="p-2">Reference</th>
              <th>Amount</th>
              <th>Transaction Type</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="transactionTable"></tbody>
        </table>
      </section>

      <!-- ADD TRANSACTION -->
    <section id="addTransaction" class="page hidden">
      <h1 class="text-2xl font-bold mb-4">Add Transaction</h1>

      <div class="bg-white p-6 rounded shadow max-w-lg">

        <!-- User -->
        <select id="tx_user_id" class="w-full border p-2 mb-3 rounded">
          <option value="">Select User</option>
        </select>

        <!-- Account Type -->
        <select id="tx_account_type" class="w-full border p-2 mb-3 rounded">
          <option value="savings">Savings</option>
          <option value="checking">Checking</option>
        </select>

        <!-- Amount -->
        <input id="tx_amount" type="number" class="w-full border p-2 mb-3 rounded" placeholder="Amount">

        <!-- Description -->
        <input id="tx_description" type="text" class="w-full border p-2 mb-3 rounded" placeholder="Description">

        <!-- Type -->
        <select id="tx_type" class="w-full border p-2 mb-3 rounded">
          <option value="incoming">Incoming</option>
          <option value="outgoing">Outgoing</option>
        </select>

        <!-- Status -->
        <select id="tx_status" class="w-full border p-2 mb-3 rounded">
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
          <option value="failed">Failed</option>
        </select>

        <div class="flex space-x-2">
          <button onclick="showPage('transactions')" class="bg-gray-400 text-white px-4 py-2 rounded">
            Cancel
          </button>

          <button onclick="createTransaction()" class="bg-blue-600 text-white px-4 py-2 rounded">
            Create Transaction
          </button>
        </div>

      </div>
    </section>

    </div>
  </main>
</div>

<script>

const BASE_URL = "http://127.0.0.1:8000/api/v1";

function getToken() {
  return localStorage.getItem("admin_token");
}

if (!getToken()) {
  window.location.href = "index.html";
}

async function apiRequest(endpoint) {
  const res = await fetch(BASE_URL + endpoint, {
    headers: {
      "Authorization": "Bearer " + getToken(),
      "Accept": "application/json"
    }
  });
  return res.json();
}

function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");

  if (id === "addTransaction") {
    loadUsersDropdown();
  }

  if (id === "profile") {
    loadAdminProfileForm();
  }
}

function toggleProfileMenu() {
  document.getElementById("profileMenu").classList.toggle("hidden");
}

function logout() {
  localStorage.removeItem("admin_token");
  window.location.href = "index.html";
}

/* LOAD USERS */
async function loadUsers() {
  const res = await apiRequest("/admin/users");
  const users = res.data || [];

  let rows = "";

  users.forEach(user => {
    const isFrozen = user.status === "frozen";

    rows += `
      <tr>
        <td class="p-2">${user.firstname} ${user.lastname}</td>
        <td>${user.email}</td>
        <td>${user.phone}</td>
        <td>${user.status}</td>
        <td>
          <button
            onclick="toggleUserStatus(${user.id})"
            class="${isFrozen ? 'bg-green-500' : 'bg-red-500'} text-white px-2 py-1 rounded"
          >
            ${isFrozen ? 'Unfreeze' : 'Freeze'}
          </button>
        </td>
      </tr>
    `;
  });

  document.querySelector("#users tbody").innerHTML = rows;
}

async function toggleUserStatus(userId) {
  const res = await fetch(`${BASE_URL}/admin/users/${userId}/toggle-status`, {
    method: "PATCH",
    headers: {
      "Authorization": "Bearer " + getToken(),
      "Accept": "application/json"
    }
  });

  const data = await res.json();

  if (res.ok) {
    alert("User status updated successfully");
    await loadUsers();
  } else {
    alert(data.message || "Error updating user status");
  }
}

/* LOAD TRANSACTIONS */
async function loadTransactions(filter = "all") {
  const res = await apiRequest("/transactions");
  const txs = res.data || [];

  let rows = "";

  txs.filter(t => {
    if (filter === "all") return true;
    if (filter === "pending") return t.status === "pending";
    return t.transaction_type === filter;
  }).forEach(t => {
    rows += `
      <tr>
        <td class="p-2">${t.reference}</td>
        <td>${t.amount}</td>
        <td>${t.transaction_type || t.type}</td>
        <td>${t.status}</td>
        <td>
          <button onclick="deleteTransaction(${t.id})"
            class="bg-red-500 text-white px-2 py-1 rounded">
            Delete
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById("transactionTable").innerHTML = rows;
}

/* FILTER */
function filterTransactions(type) {
  loadTransactions(type);
}

/* DASHBOARD STATS */
async function loadStats() {
  try {
    const res = await apiRequest("/admin/stats");
    const stats = res.data || {};

    const cards = document.querySelectorAll("#dashboard span");

    if (cards[0]) {
      cards[0].innerText = stats.total_users || 0;
    }

    if (cards[1]) {
      cards[1].innerText = stats.total_transactions || 0;
    }

    if (cards[2]) {
      cards[2].innerText = stats.pending_transactions || 0;
    }

  } catch (error) {
    console.error("Stats Load Error:", error);
  }
}

async function loadUsersDropdown() {
  const res = await apiRequest("/admin/users");
  const users = res.data || [];

  let options = `<option value="">Select User</option>`;

  users.forEach(u => {
    options += `
      <option value="${u.id}">
        ${u.firstname} ${u.lastname}
      </option>
    `;
  });

  document.getElementById("tx_user_id").innerHTML = options;
}

async function createTransaction() {
  const payload = {
    user_id: document.getElementById("tx_user_id").value,
    account_type: document.getElementById("tx_account_type").value,
    amount: document.getElementById("tx_amount").value,
    description: document.getElementById("tx_description").value,
    transaction_type: document.getElementById("tx_type").value,
    status: document.getElementById("tx_status").value,
  };

  if (!payload.user_id || !payload.amount) {
    alert("User and Amount are required");
    return;
  }

  const res = await fetch(BASE_URL + "/transactions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json",
      "Authorization": "Bearer " + getToken()
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (res.ok) {
    alert("Transaction created successfully");

    // reset form
    document.getElementById("tx_amount").value = "";
    document.getElementById("tx_description").value = "";

    showPage("transactions");
    await loadTransactions();
    await loadStats();
  } else {
    alert(data.message || "Error creating transaction");
  }
}

async function deleteTransaction(id) {
  if (!confirm("Are you sure you want to delete this transaction?")) return;

  const res = await fetch(`${BASE_URL}/transactions/${id}`, {
    method: "DELETE",
    headers: {
      "Accept": "application/json",
      "Authorization": "Bearer " + getToken()
    }
  });

  const data = await res.json();

  if (res.ok) {
    alert("Transaction deleted successfully");
    await loadTransactions();
    await loadStats();
  } else {
    alert(data.message || "Failed to delete transaction");
  }
}

async function createUser() {
  const payload = {
    firstname: document.getElementById("firstname").value,
    lastname: document.getElementById("lastname").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    username: document.getElementById("username").value,
    password: document.getElementById("password").value,
    password_confirmation: document.getElementById("password_confirmation").value,
  };

  if (
    !payload.firstname ||
    !payload.lastname ||
    !payload.email ||
    !payload.phone ||
    !payload.username ||
    !payload.password ||
    !payload.password_confirmation

  ) {
    alert("Please fill all required fields");
    return;
  }

  const res = await fetch(BASE_URL + "/admin/users", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json",
      "Authorization": "Bearer " + getToken()
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (res.ok) {
    alert("User created successfully");

    document.getElementById("firstname").value = "";
    document.getElementById("lastname").value = "";
    document.getElementById("email").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    document.getElementById("password_confirmation").value = "";

    showPage("users");
    await loadUsers();
    await loadStats();

  } else {
    alert(data.message || "Failed to create user");
  }
}


function loadAdminProfileForm() {
  const admin = JSON.parse(localStorage.getItem("admin_data") || "{}");

  document.getElementById("admin_profile_name").value = admin.name || "";
  document.getElementById("admin_profile_email").value = admin.email || "";
  document.getElementById("admin_profile_username").value = admin.username || "";
}


async function updateAdminProfile() {
  const payload = {
    name: document.getElementById("admin_profile_name").value,
    email: document.getElementById("admin_profile_email").value,
    username: document.getElementById("admin_profile_username").value,
    password: document.getElementById("admin_profile_password").value,
    password_confirmation: document.getElementById("admin_profile_password_confirmation").value,
  };

  if (!payload.name || !payload.email || !payload.username) {
    alert("Name, Email, and Username are required");
    return;
  }

  if (
    payload.password &&
    payload.password !== payload.password_confirmation
  ) {
    alert("Password confirmation does not match");
    return;
  }

  const res = await fetch(BASE_URL + "/admin/profile", {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json",
      "Authorization": "Bearer " + getToken()
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (res.ok) {
    alert("Profile updated successfully");

    localStorage.setItem(
      "admin_data",
      JSON.stringify(data.data)
    );


    document.getElementById("admin_profile_password").value = "";
    document.getElementById("admin_profile_password_confirmation").value = "";

  } else {
    alert(data.message || "Failed to update profile");
  }
}

/* INIT */
loadUsers();
loadTransactions();
loadStats();

</script>

</body>
</html>
